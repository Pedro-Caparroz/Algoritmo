<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economia do Bilhete unico</title>
</head>
<body>
    <h1>Conhece o bilhete único?</h1>
    <h3> Vamos descobrir se ele vale a pena </h3>

    <div>
        Qual o valor da passagem?  <input type="text" id = "ipt_valor_passagem">
    </div>
    <div>
        Quantas passagens você vai usar? <input type="text" id = "ipt_qtd_passagem">
    </div>
    <div>
        <button onclick="otp_economia()">
            VER ECONOMIA
        </button>
    </div>
    <div id="id_div"></div>
</body>

<script>
    function otp_economia() {
        let Valor_estudante = Number(ipt_valor_passagem.value)/2;
        let Economia = Valor_estudante * Number(ipt_qtd_passagem.value);
        
        id_div.innerHTML = `Você economizará R$${Economia} por mês.`;
    }
</script>
</html>

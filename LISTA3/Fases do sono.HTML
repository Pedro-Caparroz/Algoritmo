<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fases do sono</title>
</head>
<body>
    <h1>QUANTO VOCÊ DORME?</h1>

    Insira seu total de horas de sono: <input type="text" id ="ipt_hrs_sono">

    <div>
        <button onclick="otp_calculosono()">
            Calcular sono
        </button>
    </div>
    <div id="div">

    </div>
</body>

    <script>
        function otp_calculosono() {
            let HorasSono = Number(ipt_hrs_sono.value)
            let fase1 = HorasSono*0.05;
            let fase2 = HorasSono * 0.45;
            let fase3 = HorasSono * 0.30;
            let fase4 = HorasSono * 0.20;
            
            div.innerHTML = `Ao dormir ${HorasSono} horas, você dormiu: <br>
            ${fase1} horas na fase 1 <br>
            ${fase2} horas na fase 2 <br>
            ${fase3} horas na fase 3 <br>
            ${fase4} horas na fase REM <br>`;


        }

    </script>
</html>

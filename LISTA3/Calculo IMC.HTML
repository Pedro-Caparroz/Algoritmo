<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC </title>
</head>
<body>
    <h1> Bem Vindo a calculadora </h1>
    <h3> Seu peso e altura não te tornam melhor ou pior </h3>

    <div>
        Qual seu peso? (em kg) <input type="text" id="ipt_Weight_user" >
    </div>
    <br> 
    <div>
        Qual sua altura? (em metros) <input type="text" id="ipt_Height">
        <div>
            <button onclick="otp_IMC()"> Calcular IMC </button>
        </div>
    </div>

    <div id = "div"></div>
    
</body>
<script>
    function otp_IMC (){
        let IMC = Number(ipt_Weight_user.value)/ (Number(ipt_Height.value) * Number(ipt_Height.value) );

        div.innerHTML = `Seu IMC é ${IMC.toFixed(2)} `;
    }
</script>
</html>
